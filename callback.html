<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Authorizing…</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; max-width: 560px; margin: 64px auto; padding: 0 16px; }
    .card { border: 1px solid #e3e3e3; border-radius: 12px; padding: 24px; }
    .ok { color: #0a7d28; } .err { color: #b00020; }
    a { color: inherit; }
  </style>
</head>
<body>
  <div class="card" id="card"><h2>Authorizing…</h2><p id="msg">Triggering the token exchange…</p></div>

  <script src="config.js"></script>
  <script>
    (async function () {
      const card = document.getElementById("card");
      const cfg = window.ALLEGRO_CONFIG;
      const q = new URLSearchParams(location.search);

      function show(title, text, cls) {
        card.innerHTML = "<h2 class='" + cls + "'>" + title + "</h2><p>" + text +
          "</p><p><a href='index.html'>&larr; Back to all stores</a></p>";
      }

      const error = q.get("error");
      if (error) return show("Authorization error", error + " " + (q.get("error_description") || ""), "err");

      const code = q.get("code");
      const state = q.get("state");
      const verifier = sessionStorage.getItem("pkce_verifier");
      const savedState = sessionStorage.getItem("pkce_state");
      const store = sessionStorage.getItem("pkce_store");
      const pat = sessionStorage.getItem("github_pat");

      if (!code) return show("Authorization error", "Missing code in callback.", "err");
      if (!verifier || !store) return show("Authorization error", "Missing PKCE session — start again from the home page.", "err");
      if (state !== savedState) return show("Authorization error", "State mismatch (possible CSRF).", "err");
      if (!pat) return show("Authorization error", "Missing GitHub token — go back and paste it, then retry.", "err");

      try {
        const res = await fetch("https://api.github.com/repos/" + cfg.dispatchRepo + "/dispatches", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + pat,
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28",
          },
          body: JSON.stringify({
            event_type: cfg.eventType,
            client_payload: { store: store, code: code, code_verifier: verifier },
          }),
        });

        if (res.status === 204) {
          sessionStorage.removeItem("pkce_verifier");
          sessionStorage.removeItem("pkce_state");
          sessionStorage.removeItem("pkce_store");
          show("&#10003; " + store + " authorized",
            "GitHub Actions is exchanging the code and saving the refresh token to <code>tokens/" + store +
            ".json</code> in the private repo (about 30 seconds).", "ok");
        } else {
          const data = await res.json().catch(() => ({}));
          show("Authorization error", "GitHub dispatch failed (HTTP " + res.status + "): " +
            (data.message || "check the token's permissions (Contents: write)."), "err");
        }
      } catch (e) {
        show("Authorization error", "Could not reach GitHub: " + e.message, "err");
      }
    })();
  </script>
</body>
</html>
