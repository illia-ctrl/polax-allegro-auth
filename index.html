<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Allegro authorization</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; max-width: 560px; margin: 56px auto; padding: 0 16px; }
    h1 { font-size: 22px; }
    p.sub { color: #666; margin-top: -8px; }
    .store { display: flex; align-items: center; justify-content: space-between; gap: 16px;
      border: 1px solid #e3e3e3; border-radius: 12px; padding: 16px 20px; margin: 12px 0; }
    .store .name { font-weight: 600; }
    button.btn { background: #ff5a00; color: #fff; border: 0; cursor: pointer; padding: 10px 18px;
      border-radius: 8px; font-weight: 600; font-size: 14px; }
    button.btn:hover { background: #e85200; }
    footer { color: #888; font-size: 13px; margin-top: 32px; }
  </style>
</head>
<body>
  <h1>Allegro authorization</h1>
  <p class="sub">Sign in to each store once. PKCE is used — no client secret in the browser.</p>
  <div id="stores"></div>
  <footer>The authorization code is exchanged via PKCE; a minimal backend writes the refresh token to a private GitHub repo.</footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>window.AllegroAuth.renderStores();</script>
</body>
</html>
